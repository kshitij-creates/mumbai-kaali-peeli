<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- SVG Filter for the pure Yellow Neon Glow -->
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Intense Yellow Underglow -->
  <ellipse cx="32" cy="56" rx="22" ry="3" fill="#FFD700" opacity="0.4" filter="url(#glow-yellow)" />

  <!-- Auto Roof (Pitch Black, thick glowing yellow outline) -->
  <path d="M 12 26 L 20 12 L 46 12 L 48 26 Z" fill="#000000" stroke="#FFD700" stroke-width="2.5" filter="url(#glow-yellow)"/>
  
  <!-- Auto Body (Deep Black) -->
  <path d="M 10 26 L 48 26 L 54 48 L 8 48 Z" fill="#050505" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>
  
  <!-- Cyber-Surreal Circuit Lines on the back body -->
  <path d="M 12 48 L 18 42 L 24 48" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.6" filter="url(#glow-light)"/>
  <line x1="38" y1="48" x2="44" y2="42" stroke="#FFD700" stroke-width="1" opacity="0.6" filter="url(#glow-light)"/>

  <!-- Passenger Opening -->
  <path d="M 14 29 L 30 29 L 30 44 L 12 44 Z" fill="#0a0a0a" stroke="#FFD700" stroke-width="1.5" filter="url(#glow-yellow)"/>
  
  <!-- COOL ART: Cyber-Surreal Eye Decal inside the cabin -->
  <g transform="translate(16, 33)">
    <!-- Eye shape -->
    <path d="M 0 4 Q 5 -1 10 4 Q 5 9 0 4 Z" fill="none" stroke="#FFD700" stroke-width="1.2" filter="url(#glow-light)"/>
    <!-- Glowing Pupil -->
    <circle cx="5" cy="4" r="1.5" fill="#FFD700" filter="url(#glow-yellow)"/>
    <!-- Stylized tear/drip -->
    <path d="M 5 6.5 L 5 10" stroke="#FFD700" stroke-width="1" filter="url(#glow-light)"/>
  </g>

  <!-- Cyber Windshield (Blacked out) -->
  <path d="M 34 16 L 44 16 L 46 26 L 34 26 Z" fill="#000000" stroke="#FFD700" stroke-width="1.5" filter="url(#glow-yellow)"/>
  
  <!-- Hollow Neon Wheels -->
  <circle cx="16" cy="52" r="6" fill="#0a0a0a" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>
  <circle cx="48" cy="52" r="6" fill="#0a0a0a" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>
  
  <!-- Front Laser Headlight -->
  <line x1="54" y1="40" x2="64" y2="40" stroke="#FFD700" stroke-width="3" filter="url(#glow-yellow)"/>
</svg>
