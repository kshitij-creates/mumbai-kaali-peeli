<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- SVG Filters for the Neon Glow -->
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Toxic Green Underglow -->
  <ellipse cx="32" cy="56" rx="26" ry="3" fill="#39FF14" opacity="0.4" filter="url(#glow-green)" />

  <!-- Taxi Roof (Black with Yellow glowing outline) -->
  <path d="M 14 32 L 22 18 L 42 18 L 50 32 Z" fill="#000000" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>

  <!-- Taxi Sign (Green) -->
  <rect x="27" y="10" width="10" height="6" rx="2" fill="#050505" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)"/>

  <!-- Main Body (Deep Black, Yellow Outline) -->
  <path d="M 6 32 L 58 32 L 60 46 C 60 50 56 52 56 52 L 8 52 C 8 52 4 50 4 46 Z" fill="#050505" stroke="#FFD700" stroke-width="2.5" filter="url(#glow-yellow)"/>

  <!-- Glowing Green Decal Trims -->
  <path d="M 6 48 L 14 48" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)"/>
  <path d="M 50 48 L 58 48" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)"/>

  <!-- Pitch Black Windows with Green Outlines -->
  <path d="M 23 21 L 31 21 L 31 29 L 16 29 Z" fill="#000000" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)"/>
  <path d="M 34 21 L 41 21 L 48 29 L 34 29 Z" fill="#000000" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)"/>

  <!-- COOL ART: Cyber-Surreal Phantom Skull Decal -->
  <g transform="translate(26, 34)" filter="url(#glow-green)">
    <!-- Skull Dome -->
    <path d="M 2 6 C 2 0 10 0 10 6 C 10 9 9 11 8 13 L 4 13 C 3 11 2 9 2 6 Z" fill="none" stroke="#39FF14" stroke-width="1.2"/>
    <!-- Cyber Angry Eyes -->
    <line x1="3.5" y1="5" x2="5.5" y2="7" stroke="#39FF14" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8.5" y1="5" x2="6.5" y2="7" stroke="#39FF14" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Teeth Grille -->
    <line x1="4.5" y1="10" x2="4.5" y2="13" stroke="#39FF14" stroke-width="1"/>
    <line x1="7.5" y1="10" x2="7.5" y2="13" stroke="#39FF14" stroke-width="1"/>
    <line x1="6" y1="10" x2="6" y2="13" stroke="#39FF14" stroke-width="1"/>
  </g>

  <!-- Hollow Neon Wheels (Yellow) -->
  <circle cx="16" cy="52" r="6" fill="#0a0a0a" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>
  <circle cx="48" cy="52" r="6" fill="#0a0a0a" stroke="#FFD700" stroke-width="2" filter="url(#glow-yellow)"/>

  <!-- Laser Headlight Beam (Green) -->
  <polygon points="58,40 64,37 64,43" fill="#39FF14" opacity="0.6" filter="url(#glow-green)"/>
</svg>
